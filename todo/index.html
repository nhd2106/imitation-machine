<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny TODO</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Tiny TODO</h1>
      <form id="todo-form" class="todo-form">
        <input id="todo-input" name="text" type="text" placeholder="Add a task" required />
        <button type="submit">Add</button>
      </form>

      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

      <footer class="footer">
        <span id="remaining-count">0 items left</span>
        <button id="clear-completed" type="button">Clear completed</button>
      </footer>
    </main>

    <script type="module" src="./app.ts"></script>
  </body>
</html>
